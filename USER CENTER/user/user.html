        <script>
            document.addEventListener('DOMContentLoaded', function() {
                // 获取所有导航项和页面内容
                const navItems = document.querySelectorAll('.nav-item');
                const pages = document.querySelectorAll('.page-content');
            
                // 为每个导航项添加点击事件
                navItems.forEach(item => {
                    item.addEventListener('click', function() {
                        // 移除所有导航项的active类
                        navItems.forEach(nav => nav.classList.remove('active'));
                        
                        // 为当前点击的导航项添加active类
                        this.classList.add('active');
            
                        // 获取目标页面ID
                        const targetPageId = this.getAttribute('data-page');
            
                        // 隐藏所有页面
                        pages.forEach(page => {
                            page.style.display = 'none';
                        });
            
                        // 显示目标页面
                        const targetPage = document.getElementById(targetPageId);
                        if (targetPage) {
                            targetPage.style.display = 'block';
                        }
                    });
                });
            
                // 更新个人信息显示
                const savedUsername = localStorage.getItem('username');
                const savedEmail = localStorage.getItem('email');
                const savedPhone = localStorage.getItem('phone');
                const savedAddress = localStorage.getItem('address');
                
                if (savedUsername) {
                    document.getElementById('username').textContent = savedUsername;
                    document.getElementById('profile-username').textContent = savedUsername;
                }
                
                if (savedEmail) {
                    document.getElementById('profile-email').textContent = savedEmail;
                }
                
                if (savedPhone) {
                    document.getElementById('profile-phone').textContent = savedPhone;
                }
                if (savedAddress) {
                    document.getElementById('profile-address').textContent = savedAddress;
                }
            
                // 加载收藏的书籍
                displayFavoriteBooks();
            });
            
            // 显示收藏的书籍
            function displayFavoriteBooks() {
                const bookGrid = document.querySelector('.book-grid');
                const favoriteBooks = JSON.parse(localStorage.getItem('favoriteBooks')) || [];
                
                if (bookGrid) {
                    bookGrid.innerHTML = '';
                    favoriteBooks.forEach(book => {
                        const bookCard = createBookCard(book);
                        bookGrid.appendChild(bookCard);
                    });
                }
            }
            
            // 创建书籍卡片
            function createBookCard(book) {
                const card = document.createElement('div');
                card.className = 'card book-card';
                card.innerHTML = `
                    <img src="${book.image}" alt="${book.title}" style="width: 100%; height: 200px; object-fit: cover;">
                    <div class="book-info" style="padding: 10px;">
                        <h3 style="margin: 0;">${book.title}</h3>
                        <p style="color: #666;">${book.author}</p>
                        <button onclick="removeFromFavorites('${book.id}')" 
                                style="background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">
                            移除收藏
                        </button>
                    </div>
                `;
                return card;
            }
            
            // 从收藏中移除
            function removeFromFavorites(bookId) {
                let favoriteBooks = JSON.parse(localStorage.getItem('favoriteBooks')) || [];
                favoriteBooks = favoriteBooks.filter(book => book.id !== bookId);
                localStorage.setItem('favoriteBooks', JSON.stringify(favoriteBooks));
                displayFavoriteBooks();
            }
            </script>

        <script>
            document.addEventListener('DOMContentLoaded', function() {
                // 获取所有导航项和页面内容
                const navItems = document.querySelectorAll('.nav-item');
                const pages = document.querySelectorAll('.page-content');
            
                // 设置默认显示的页面
                document.getElementById('home').classList.add('active');
            
                // 为每个导航项添加点击事件
                navItems.forEach(item => {
                    item.addEventListener('click', function() {
                        // 移除所有导航项的active类
                        navItems.forEach(nav => nav.classList.remove('active'));
                        
                        // 为当前点击的导航项添加active类
                        this.classList.add('active');
            
                        // 获取目标页面ID
                        const targetPageId = this.getAttribute('data-page');
            
                        // 隐藏所有页面
                        pages.forEach(page => {
                            page.classList.remove('active');
                        });
            
                        // 显示目标页面
                        const targetPage = document.getElementById(targetPageId);
                        if (targetPage) {
                            targetPage.classList.add('active');
                        }
                    });
                });
            
                // 搜索功能
                const searchInput = document.querySelector('.search-input');
                searchInput.addEventListener('input', function(e) {
                    const searchTerm = e.target.value.toLowerCase();
                    // 这里添加搜索逻辑
                    console.log('搜索:', searchTerm);
                });
            });
            
            // 页面切换动画效果
            function switchPage(fromPage, toPage) {
                fromPage.style.opacity = '0';
                setTimeout(() => {
                    fromPage.style.display = 'none';
                    toPage.style.display = 'block';
                    setTimeout(() => {
                        toPage.style.opacity = '1';
                    }, 50);
                }, 300);
            }
            </script>
