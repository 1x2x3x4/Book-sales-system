<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车 - 云间书阁</title>
    <link rel="stylesheet" href="cart.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <div class="header-content">
            <div class="user-status">
                <div id="userInfo">
                    <!-- 用户信息将通过JavaScript动态插入 -->
                </div>
                <div class="nav-links">
                    <a href="#" id="logoutLink" style="display: none;">退出</a>
                </div>
            </div>
            <h1><a href="../SEARCH/index user.html">云间书阁</a></h1>
        </div>
    </header>

    <main class="cart-page">
        <div class="container">
            <h2>我的购物车</h2>
            <div class="cart-content">
                <div class="cart-list" id="cartList">
                    <!-- 购物车列表将通过JavaScript动态生成 -->
                </div>
                <div class="cart-summary">
                    <div class="summary-content">
                        <div class="summary-item">
                            <span>商品总数：</span>
                            <span id="totalItems">0</span>
                        </div>
                        <div class="summary-item">
                            <span>商品总价：</span>
                            <span id="totalPrice">￥0.00</span>
                        </div>
                        <div class="summary-item discount">
                            <span>优惠金额：</span>
                            <span id="totalDiscount">-￥0.00</span>
                        </div>
                        <div class="summary-item total">
                            <span>应付金额：</span>
                            <span id="finalPrice">￥0.00</span>
                        </div>
                    </div>
                    <div class="cart-actions">
                        <button class="clear-cart" onclick="clearCart()">清空购物车</button>
                        <button class="checkout" onclick="checkout()">结算</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>© 2024 云间书阁 - 让阅读成为一种享受</p>
    </footer>

    <script src="cart.js"></script>
</body>
</html>
